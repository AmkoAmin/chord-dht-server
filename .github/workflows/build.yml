name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libzmq3-dev

      - name: Build tcp-http-server
        run: cmake -B tcp-http-server/build tcp-http-server && make -C tcp-http-server/build

      - name: Build chord-node
        run: cmake -B chord-node/build chord-node && make -C chord-node/build

      - name: Build mapreduce-wordcount
        run: cmake -B mapreduce-wordcount/build mapreduce-wordcount && make -C mapreduce-wordcount/build
