name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake libzmq3-dev

      - name: Build praxis0
        run: cmake -B praxis0/build praxis0 && make -C praxis0/build

      - name: Build praxis1
        run: cmake -B praxis1/build praxis1 && make -C praxis1/build

      - name: Build praxis2
        run: cmake -B praxis2/build praxis2 && make -C praxis2/build

      - name: Build praxis3
        run: cmake -B praxis3/build praxis3 && make -C praxis3/build
